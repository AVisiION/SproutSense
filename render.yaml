services:
  - type: web
    name: sproutsense-backend
    runtime: node
    rootDir: apps/api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
