<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Gradient for leaf body -->
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#16a34a;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1"/>
    </linearGradient>
    
    <!-- Glow filter for circuit elements -->
    <filter id="circuitGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Stronger glow for active dots -->
    <filter id="dotGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Radial gradient for glowing dots -->
    <radialGradient id="dotGradient">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#0ea5e9;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:0.7"/>
    </radialGradient>
  </defs>
  
  <!-- Main leaf shape - asymmetric natural form -->
  <path d="M 256 32 
           C 280 32 320 50 340 80
           C 360 110 380 150 390 190
           C 400 230 405 270 400 310
           C 395 350 380 390 350 420
           C 320 450 280 470 256 480
           C 245 470 230 460 215 445
           C 185 415 165 375 155 335
           C 145 295 140 250 145 210
           C 150 170 165 130 190 100
           C 215 70 235 32 256 32 Z" 
        fill="url(#leafGradient)" 
        stroke="#15803d" 
        stroke-width="3"
        opacity="0.95">
    <!-- Subtle breathing animation -->
    <animate attributeName="opacity" values="0.9;0.98;0.9" dur="4s" repeatCount="indefinite"/>
  </path>
  
  <!-- Leaf outline highlight -->
  <path d="M 256 32 
           C 280 32 320 50 340 80
           C 360 110 380 150 390 190
           C 400 230 405 270 400 310
           C 395 350 380 390 350 420
           C 320 450 280 470 256 480
           C 245 470 230 460 215 445
           C 185 415 165 375 155 335
           C 145 295 140 250 145 210
           C 150 170 165 130 190 100
           C 215 70 235 32 256 32 Z" 
        fill="none" 
        stroke="#4ade80" 
        stroke-width="2"
        opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite"/>
  </path>
  
  <!-- Central vein (stem) - circuit style -->
  <path d="M 256 32 L 256 480" 
        stroke="#22d3ee" 
        stroke-width="4" 
        stroke-linecap="round"
        filter="url(#circuitGlow)"
        opacity="0.8">
    <animate attributeName="opacity" values="0.7;0.9;0.7" dur="2s" repeatCount="indefinite"/>
  </path>
  
  <!-- Right side veins - circuit pattern -->
  <g stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#circuitGlow)" opacity="0.7">
    <!-- Upper right veins -->
    <path d="M 256 100 L 310 120 L 340 140">
      <animate attributeName="stroke-dasharray" values="0,200;200,0" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-200" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 256 150 L 320 170 L 360 200">
      <animate attributeName="stroke-dasharray" values="0,250;250,0" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-250" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M 256 200 L 330 230 L 375 270">
      <animate attributeName="stroke-dasharray" values="0,280;280,0" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-280" dur="2.4s" repeatCount="indefinite"/>
    </path>
    <path d="M 256 250 L 340 280 L 380 320">
      <animate attributeName="stroke-dasharray" values="0,300;300,0" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-300" dur="2.6s" repeatCount="indefinite"/>
    </path>
    <path d="M 256 300 L 330 330 L 370 370">
      <animate attributeName="stroke-dasharray" values="0,280;280,0" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-280" dur="2.8s" repeatCount="indefinite"/>
    </path>
    <path d="M 256 350 L 310 375 L 340 410">
      <animate attributeName="stroke-dasharray" values="0,220;220,0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-220" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M 256 400 L 290 420 L 310 445">
      <animate attributeName="stroke-dasharray" values="0,180;180,0" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-180" dur="3.2s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Left side veins - circuit pattern -->
  <g stroke="#14b8a6" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#circuitGlow)" opacity="0.7">
    <!-- Upper left veins -->
    <path d="M 256 100 L 210 115 L 190 130">
      <animate attributeName="stroke-dasharray" values="0,180;180,0" dur="2.1s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-180" dur="2.1s" repeatCount="indefinite"/>
    </path>
    <path d="M 256 150 L 200 165 L 170 185">
      <animate attributeName="stroke-dasharray" values="0,200;200,0" dur="2.3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-200" dur="2.3s" repeatCount="indefinite"/>
    </path>
    <path d="M 256 200 L 190 220 L 160 245">
      <animate attributeName="stroke-dasharray" values="0,230;230,0" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-230" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 256 250 L 180 275 L 155 305">
      <animate attributeName="stroke-dasharray" values="0,250;250,0" dur="2.7s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-250" dur="2.7s" repeatCount="indefinite"/>
    </path>
    <path d="M 256 300 L 190 325 L 160 355">
      <animate attributeName="stroke-dasharray" values="0,230;230,0" dur="2.9s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-230" dur="2.9s" repeatCount="indefinite"/>
    </path>
    <path d="M 256 350 L 205 370 L 180 395">
      <animate attributeName="stroke-dasharray" values="0,200;200,0" dur="3.1s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-200" dur="3.1s" repeatCount="indefinite"/>
    </path>
    <path d="M 256 400 L 220 415 L 200 435">
      <animate attributeName="stroke-dasharray" values="0,150;150,0" dur="3.3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-150" dur="3.3s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Secondary tiny veins for detail -->
  <g stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.3">
    <path d="M 310 120 L 325 135"/>
    <path d="M 320 170 L 340 185"/>
    <path d="M 330 230 L 355 250"/>
    <path d="M 340 280 L 365 305"/>
    <path d="M 330 330 L 350 355"/>
    <path d="M 210 115 L 195 125"/>
    <path d="M 200 165 L 180 175"/>
    <path d="M 190 220 L 170 235"/>
    <path d="M 180 275 L 165 290"/>
    <path d="M 190 325 L 175 340"/>
  </g>
  
  <!-- IoT Sensor nodes - glowing dots at vein intersections -->
  <g filter="url(#dotGlow)">
    <!-- Top sensor -->
    <circle cx="256" cy="80" r="8" fill="url(#dotGradient)" opacity="0.9">
      <animate attributeName="r" values="7;10;7" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Right side sensors -->
    <circle cx="310" cy="120" r="7" fill="url(#dotGradient)" opacity="0.9">
      <animate attributeName="r" values="6;9;6" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="340" cy="140" r="6" fill="#22d3ee" opacity="0.85">
      <animate attributeName="r" values="5;7;5" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.75;0.95;0.75" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="360" cy="200" r="7" fill="url(#dotGradient)" opacity="0.9">
      <animate attributeName="r" values="6;9;6" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="375" cy="270" r="6" fill="#22d3ee" opacity="0.85">
      <animate attributeName="r" values="5;7;5" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.75;0.95;0.75" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="380" cy="320" r="7" fill="url(#dotGradient)" opacity="0.9">
      <animate attributeName="r" values="6;9;6" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Left side sensors -->
    <circle cx="210" cy="115" r="6" fill="#14b8a6" opacity="0.85">
      <animate attributeName="r" values="5;7;5" dur="2.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.75;0.95;0.75" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="190" cy="130" r="5" fill="#0ea5e9" opacity="0.8">
      <animate attributeName="r" values="4;6;4" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.9;0.7" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="170" cy="185" r="6" fill="#14b8a6" opacity="0.85">
      <animate attributeName="r" values="5;7;5" dur="2.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.75;0.95;0.75" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="245" r="7" fill="url(#dotGradient)" opacity="0.9">
      <animate attributeName="r" values="6;9;6" dur="2.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="155" cy="305" r="6" fill="#14b8a6" opacity="0.85">
      <animate attributeName="r" values="5;7;5" dur="3.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.75;0.95;0.75" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Center nodes along main vein -->
    <circle cx="256" cy="150" r="5" fill="#4ade80" opacity="0.7">
      <animate attributeName="r" values="4;6;4" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.85;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="256" cy="250" r="6" fill="#4ade80" opacity="0.75">
      <animate attributeName="r" values="5;7;5" dur="2.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.65;0.9;0.65" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="256" cy="350" r="5" fill="#4ade80" opacity="0.7">
      <animate attributeName="r" values="4;6;4" dur="2.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.85;0.6" dur="2.9s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Bottom sensor -->
    <circle cx="256" cy="450" r="7" fill="url(#dotGradient)" opacity="0.9">
      <animate attributeName="r" values="6;9;6" dur="2.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2.1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Circuit nodes - small squares at key points -->
  <g fill="#22d3ee" opacity="0.6">
    <rect x="252" y="96" width="8" height="8" rx="1">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="252" y="196" width="8" height="8" rx="1">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="252" y="296" width="8" height="8" rx="1">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="252" y="396" width="8" height="8" rx="1">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3.1s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Highlight sparkles for extra life -->
  <g fill="#ffffff" opacity="0.3">
    <circle cx="280" cy="100" r="2">
      <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="180" r="2">
      <animate attributeName="opacity" values="0;0.6;0" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="280" r="2">
      <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="150" r="2">
      <animate attributeName="opacity" values="0;0.6;0" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="175" cy="270" r="2">
      <animate attributeName="opacity" values="0;0.6;0" dur="3.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
