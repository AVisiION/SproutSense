<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="64" height="64" fill="#050d14" rx="12"/>
  
  <!-- Plant with subtle sway animation -->
  <g>
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      values="0 32 40;-1.5 32 40;0 32 40;1.5 32 40;0 32 40" 
      dur="5s" 
      repeatCount="indefinite"/>
    <path d="M32 14c-3 0-5 2-5 5 0 2 1 3 2 4-2 1-3 3-3 5v8c0 3 2 6 5 6h2c3 0 5-3 5-6v-8c0-2-1-4-3-5 1-1 2-2 2-4 0-3-2-5-5-5z" fill="#22c55e" filter="url(#glow)">
      <animate attributeName="fill-opacity" values="1;0.9;1" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Soil with subtle breathing -->
  <ellipse cx="32" cy="46" rx="12" ry="6" fill="#14b8a6" opacity="0.8">
    <animate attributeName="opacity" values="0.75;0.85;0.75" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="12;12.5;12" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Sensor indicators (blinking) -->
  <circle cx="28" cy="37" r="1.5" fill="#22d3ee" opacity="0.9" filter="url(#glow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="36" cy="39" r="1.5" fill="#22d3ee" opacity="0.9" filter="url(#glow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Small leaves with growing animation -->
  <g>
    <path d="M26 19c-1-2-2-3-4-3-1 0-2 1-2 2s1 2 2 2c1 0 2-1 3-1" stroke="#4ade80" stroke-width="1.5" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M38 19c1-2 2-3 4-3 1 0 2 1 2 2s-1 2-2 2c-1 0-2-1-3-1" stroke="#4ade80" stroke-width="1.5" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-opacity" values="0.8;1;0.8" dur="2.8s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>