<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d14"/>
      <stop offset="50%" style="stop-color:#091824"/>
      <stop offset="100%" style="stop-color:#0f2535"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <rect width="1200" height="675" fill="url(#glow3)"/>
  
  <!-- Plant + IoT Setup (centered) -->
  <g transform="translate(350, 220)">
    <!-- Pot -->
    <path d="M0 150 L-70 250 L70 250 L0 150 z" fill="#14b8a6" opacity="0.9"/>
    <ellipse cy="150" rx="75" ry="18" fill="#14b8a6"/>
    <ellipse cy="155" rx="70" ry="15" fill="#0f2535" opacity="0.8"/>
    
    <!-- Plant -->
    <path d="M0 150 Q-8 90 -12 40 Q-10 15 0 5" stroke="#22c55e" stroke-width="10" fill="none" stroke-linecap="round"/>
    <ellipse cx="-45" cy="75" rx="38" ry="22" fill="#22c55e" transform="rotate(-35 -45 75)"/>
    <ellipse cx="35" cy="95" rx="35" ry="20" fill="#4ade80" transform="rotate(30 35 95)"/>
    <ellipse cx="-30" cy="35" rx="40" ry="24" fill="#22c55e" transform="rotate(-20 -30 35)"/>
    <ellipse cx="28" cy="50" rx="32" ry="18" fill="#4ade80" transform="rotate(25 28 50)"/>
    
    <!-- ESP32 microcontroller -->
    <g transform="translate(-100, 200)">
      <rect width="60" height="45" rx="5" fill="#1e293b" stroke="#22d3ee" stroke-width="2.5"/>
      <text x="30" y="27" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="12" font-weight="bold">ESP32</text>
      <circle cx="15" cy="10" r="3" fill="#22d3ee"/>
      <circle cx="45" cy="10" r="3" fill="#22d3ee"/>
      <circle cx="15" cy="35" r="3" fill="#22d3ee"/>
      <circle cx="45" cy="35" r="3" fill="#22d3ee"/>
    </g>
    
    <!-- Sensor icons -->
    <g opacity="0.9">
      <circle cx="85" cy="180" r="22" fill="#14b8a6" opacity="0.3" stroke="#14b8a6" stroke-width="2"/>
      <text x="85" y="188" text-anchor="middle" fill="#14b8a6" font-size="16">💧</text>
      
      <circle cx="85" cy="230" r="22" fill="#22c55e" opacity="0.3" stroke="#22c55e" stroke-width="2"/>
      <text x="85" y="238" text-anchor="middle" fill="#22c55e" font-size="16">🌡️</text>
    </g>
    
    <!-- Connection wires -->
    <path d="M-70 222 Q-85 212 -85 200" stroke="#22d3ee" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
    <path d="M-40 222 Q20 210 63 200" stroke="#22d3ee" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
  </g>
  
  <!-- Title and description (right side) -->
  <g transform="translate(650, 180)">
    <text y="40" fill="white" font-family="system-ui" font-size="56" font-weight="bold">SproutSense</text>
    <text y="90" fill="#22d3ee" font-family="system-ui" font-size="26" font-weight="500">IoT Plant Care System</text>
    
    <text y="170" fill="#94a3b8" font-family="system-ui" font-size="20" font-weight="400">
      <tspan x="0" dy="0">✓ Auto watering with ESP32</tspan>
      <tspan x="0" dy="35">✓ AI disease detection</tspan>
      <tspan x="0" dy="35">✓ Real-time monitoring</tspan>
      <tspan x="0" dy="35">✓ Smart notifications</tspan>
    </text>
  </g>
  
  <!-- Brand badge -->
  <g transform="translate(50, 590)">
    <rect width="280" height="60" rx="30" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
    <text x="140" y="40" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="22" font-weight="600">Open Source IoT</text>
  </g>
</svg>