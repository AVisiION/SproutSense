  <style>
    /* ============================================================
       SPROUTSENSE — PROFESSIONAL LOADING SCREEN
       Supports: Light Mode & Dark Mode via prefers-color-scheme
    ============================================================ */

    :root {
      --ss-bg-light: #f0f8f2;
      --ss-bg-dark: #050d14;
      --ss-accent: #14b8a6;
      --ss-accent2: #22c55e;
      --ss-text-light: #1a3a2a;
      --ss-text-dark: #d1fae5;
      --ss-ring-light: rgba(20, 184, 166, 0.18);
      --ss-ring-dark: rgba(20, 184, 166, 0.12);
      --ss-particle-light: rgba(34, 197, 94, 0.55);
      --ss-particle-dark: rgba(20, 184, 166, 0.55);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    #ss-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--ss-bg-light);
      transition: opacity 0.65s cubic-bezier(0.4, 0, 0.2, 1),
                  visibility 0.65s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }

    @media (prefers-color-scheme: dark) {
      #ss-loader { background: var(--ss-bg-dark); }
    }

    /* Fade-out state triggered by JS */
    #ss-loader.ss-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* ---- Ambient glow background ---- */
    #ss-loader::before {
      content: '';
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(20,184,166,0.13) 0%, transparent 70%);
      animation: ss-pulse-glow 3.2s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes ss-pulse-glow {
      0%, 100% { transform: scale(0.85); opacity: 0.6; }
      50%       { transform: scale(1.15); opacity: 1; }
    }

    /* ---- Outer spinning ring ---- */
    .ss-ring-outer {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--ss-accent);
      border-right-color: var(--ss-accent2);
      animation: ss-spin 2.4s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
      filter: drop-shadow(0 0 8px var(--ss-accent));
    }

    /* ---- Middle dashed ring ---- */
    .ss-ring-mid {
      position: absolute;
      width: 162px;
      height: 162px;
      border-radius: 50%;
      border: 1.5px dashed rgba(20, 184, 166, 0.35);
      animation: ss-spin-reverse 5s linear infinite;
    }

    @media (prefers-color-scheme: dark) {
      .ss-ring-outer { filter: drop-shadow(0 0 12px var(--ss-accent)); }
      .ss-ring-mid   { border-color: rgba(20, 184, 166, 0.25); }
    }

    @keyframes ss-spin         { to { transform: rotate(360deg); } }
    @keyframes ss-spin-reverse { to { transform: rotate(-360deg); } }

    /* ---- Icon wrapper ---- */
    .ss-icon-wrap {
      position: relative;
      width: 110px;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: ss-icon-float 3s ease-in-out infinite;
    }

    .ss-icon-wrap img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      filter: drop-shadow(0 4px 18px rgba(20, 184, 166, 0.45));
      animation: ss-icon-breathe 3s ease-in-out infinite;
      border-radius: 18px;
    }

    @media (prefers-color-scheme: dark) {
      .ss-icon-wrap img {
        filter: drop-shadow(0 4px 22px rgba(20, 184, 166, 0.7))
                brightness(1.08);
      }
    }

    @keyframes ss-icon-float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-7px); }
    }

    @keyframes ss-icon-breathe {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.06); }
    }

    /* ---- Floating particles ---- */
    .ss-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .ss-particle {
      position: absolute;
      border-radius: 50%;
      background: var(--ss-particle-light);
      animation: ss-rise linear infinite;
      opacity: 0;
    }

    @media (prefers-color-scheme: dark) {
      .ss-particle { background: var(--ss-particle-dark); }
    }

    .ss-particle:nth-child(1)  { width:5px;  height:5px;  left:12%;  animation-duration:4.2s; animation-delay:0s;    }
    .ss-particle:nth-child(2)  { width:3px;  height:3px;  left:25%;  animation-duration:5.1s; animation-delay:0.8s;  }
    .ss-particle:nth-child(3)  { width:6px;  height:6px;  left:38%;  animation-duration:3.8s; animation-delay:1.5s;  }
    .ss-particle:nth-child(4)  { width:4px;  height:4px;  left:55%;  animation-duration:4.6s; animation-delay:0.3s;  }
    .ss-particle:nth-child(5)  { width:5px;  height:5px;  left:68%;  animation-duration:5.4s; animation-delay:1.1s;  }
    .ss-particle:nth-child(6)  { width:3px;  height:3px;  left:80%;  animation-duration:4.0s; animation-delay:2.0s;  }
    .ss-particle:nth-child(7)  { width:4px;  height:4px;  left:90%;  animation-duration:3.5s; animation-delay:0.6s;  }
    .ss-particle:nth-child(8)  { width:6px;  height:6px;  left:5%;   animation-duration:4.8s; animation-delay:1.8s;  }

    @keyframes ss-rise {
      0%   { transform: translateY(110vh) scale(0.4); opacity: 0; }
      20%  { opacity: 0.9; }
      80%  { opacity: 0.7; }
      100% { transform: translateY(-10vh) scale(1.1);  opacity: 0; }
    }

    /* ---- Progress bar ---- */
    .ss-progress-track {
      position: absolute;
      bottom: 72px;
      width: min(280px, 70vw);
      height: 3px;
      background: rgba(20, 184, 166, 0.15);
      border-radius: 99px;
      overflow: hidden;
    }

    .ss-progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--ss-accent2), var(--ss-accent));
      box-shadow: 0 0 10px var(--ss-accent);
      animation: ss-progress 2.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes ss-progress {
      0%   { width: 0%; }
      40%  { width: 55%; }
      70%  { width: 78%; }
      90%  { width: 92%; }
      100% { width: 100%; }
    }

    /* ---- Brand text ---- */
    .ss-brand {
      position: absolute;
      bottom: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .ss-brand-name {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--ss-text-light);
      animation: ss-fade-up 0.9s ease both;
    }

    .ss-brand-tagline {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 11.5px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ss-accent);
      animation: ss-fade-up 0.9s 0.2s ease both;
    }

    @media (prefers-color-scheme: dark) {
      .ss-brand-name    { color: var(--ss-text-dark); }
      .ss-brand-tagline { color: var(--ss-accent2); }
    }

    @keyframes ss-fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- Dot pulse loader (under brand) ---- */
    .ss-dots {
      position: absolute;
      bottom: 52px;
      display: flex;
      gap: 7px;
    }

    .ss-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--ss-accent);
      animation: ss-dot-bounce 1.3s ease-in-out infinite;
    }

    .ss-dot:nth-child(2) { animation-delay: 0.18s; }
    .ss-dot:nth-child(3) { animation-delay: 0.36s; }

    @media (prefers-color-scheme: dark) {
      .ss-dot { background: var(--ss-accent2); }
    }

    @keyframes ss-dot-bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40%            { transform: scale(1.2); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- ======================================================
       SPROUTSENSE LOADING SCREEN
       Removed automatically once React finishes mounting.
  ====================================================== -->
  <div id="ss-loader" role="status" aria-label="Loading SproutSense...">

    <!-- Floating ambient particles -->
    <div class="ss-particles" aria-hidden="true">
      <span class="ss-particle"></span>
      <span class="ss-particle"></span>
      <span class="ss-particle"></span>
      <span class="ss-particle"></span>
      <span class="ss-particle"></span>
      <span class="ss-particle"></span>
      <span class="ss-particle"></span>
      <span class="ss-particle"></span>
    </div>

    <!-- Spinning rings -->
    <div class="ss-ring-outer" aria-hidden="true"></div>
    <div class="ss-ring-mid"   aria-hidden="true"></div>

    <!-- Icon -->
    <div class="ss-icon-wrap">
      <img src="/assets/icon.svg" alt="SproutSense Icon" draggable="false" />
    </div>

    <!-- Brand name + tagline -->
    <div class="ss-brand">
      <span class="ss-brand-name">SproutSense</span>
      <span class="ss-brand-tagline">Smart Plant Care · IoT · AI</span>
    </div>

    <!-- Dot pulse -->
    <div class="ss-dots" aria-hidden="true">
      <span class="ss-dot"></span>
      <span class="ss-dot"></span>
      <span class="ss-dot"></span>
    </div>

    <!-- Progress bar -->
    <div class="ss-progress-track" aria-hidden="true">
      <div class="ss-progress-fill"></div>
    </div>

  </div>

  <!-- React root -->
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- Dismiss loader once React DOM is ready -->
  <script>
    (function () {
      function dismissLoader() {
        var loader = document.getElementById('ss-loader');
        if (!loader) return;
        loader.classList.add('ss-hidden');
        // Remove from DOM after transition ends to free memory
        loader.addEventListener('transitionend', function () {
          loader.remove();
        }, { once: true });
      }

      // Strategy 1: React signals readiness via custom event
      window.addEventListener('sproutsense:ready', dismissLoader, { once: true });

      // Strategy 2: Fallback — dismiss after 3.5 s in any case
      var fallback = setTimeout(dismissLoader, 3500);

      // Clean up fallback if event fires first
      window.addEventListener('sproutsense:ready', function () {
        clearTimeout(fallback);
      }, { once: true });
    })();
  </script>

</body>
