  <script>
    (function(){
      var loader = document.getElementById('ss-loader');
      var progressFill = loader ? loader.querySelector('.ss-progress-fill') : null;
      var progressLabel = loader ? loader.querySelector('.ss-progress-label') : null;
      var progress = 0;
      var readyFired = false;
      var tickTimer = null;

      function setProgress(value, labelText) {
        progress = Math.max(progress, Math.min(100, value));
        if (progressFill) progressFill.style.width = progress + '%';
        if (progressLabel && labelText) progressLabel.textContent = labelText;
      }

      function runIdleProgress() {
        clearInterval(tickTimer);
        tickTimer = setInterval(function(){
          if (readyFired || progress >= 92) {
            clearInterval(tickTimer);
            return;
          }
          setProgress(progress + 1, 'Loading modules... ' + Math.round(progress) + '%');
        }, 140);
      }

      function dismissLoader(){
        clearInterval(tickTimer);
        var l=document.getElementById('ss-loader');
        if(!l) return;
        l.classList.add('ss-hidden');
        l.addEventListener('transitionend',function(){l.remove();},{once:true});
      }

      function onAppReady() {
        if (readyFired) return;
        readyFired = true;
        setProgress(100, 'Ready');
        setTimeout(dismissLoader, 220);
      }

      setProgress(10, 'Booting engine... 10%');

      if (document.readyState !== 'loading') {
        setProgress(35, 'DOM initialized... 35%');
      } else {
        document.addEventListener('DOMContentLoaded', function(){
          setProgress(35, 'DOM initialized... 35%');
        }, { once: true });
      }

      if (document.readyState === 'complete') {
        setProgress(65, 'Assets loaded... 65%');
      } else {
        window.addEventListener('load', function(){
          setProgress(65, 'Assets loaded... 65%');
        }, { once: true });
      }

      runIdleProgress();

      window.addEventListener('sproutsense:ready', onAppReady, { once: true });

      // Fallback: keep UX responsive if app-ready event never fires.
      var fb = setTimeout(function(){
        setProgress(100, 'Ready');
        dismissLoader();
      }, 9000);
      window.addEventListener('sproutsense:ready',function(){clearTimeout(fb);},{once:true});
    })();
  </script>
